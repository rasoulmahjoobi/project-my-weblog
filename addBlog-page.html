<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Blog</title>
    <script src="tailwind.js"></script>
  </head>
  
<!-- items-center کار نمیکند -->
  <body class="flex items-center justify-center">
    <form class="bg-gray-700 p-8 rounded-2xl w-full max-w-lg">
      <h2 class="text-white text-2xl font-bold mb-6">Add New Blog</h2>

      <div class="mb-4">
        <label class="block text-gray-300 mb-2">Blog Title</label>
        <input
          type="text"
          class="w-full bg-gray-600 rounded-lg p-3 text-white"
          placeholder="Enter title"
        />
      </div>

      <div class="mb-4">
        <label class="block text-gray-300 mb-2">Image URL</label>
        <input
          type="text"
          class="w-full bg-gray-600 rounded-lg p-3 text-white"
          placeholder="Enter image url"
        />
      </div>

      <div class="mb-6">
        <label class="block text-gray-300 mb-2">Description</label>
        <textarea
          class="w-full bg-gray-600 rounded-lg p-3 text-white h-32"
        ></textarea>
      </div>

      <button
        class="w-full bg-gradient-to-r from-blue-500 to-purple-500 text-white pt-3 pb-3 rounded-lg font-bold"
      >
        Save Blog
      </button>
    </form>
  </body>
</html>
