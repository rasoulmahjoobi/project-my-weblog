<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="tailwind.js"></script>
  </head>
  <body class="w-full h-full flex justify-center mt-11">
    <div class="w-3/4 h-auto bg-slate-800">
      <!-- titel head  -->
      <div class="pt-8 pl-7">
        <h1 class="text-4xl text-cyan-500">My Weblog</h1>
      </div>
<!-- box search and button addBlog -->
      <div>
        <span><input
            class="bg-slate-700 w-3/5 h-10 mt-7 ml-8 rounded-md"
            type="text"
            placeholder="  Saerch blogs..."/></span>
        <span
          ><button class="bg-teal-500 w-60 h-10 ml-16 rounded-md">
            Add New Blog
          </button></span>
      </div>
<!-- boxes for blog -->
      <div class="flex justify-center ">
        <div class="bg-slate-600 w-3/4 h-52 mt-7 mb-7 rounded-3xl">
            <h1 class="text-slate-50 text-3xl mt-5 ml-8">laerning rest apis</h1>
            <p class="text-slate-300 text-lg  mt-5 ml-8 ">Lorem ipsum dolor sit amet consectetur adipisicing elit...</p>
<div class="mt-10 ml-8">
                <p id="blogdate" class="text-slate-300 text-base  pb-1">1234</p>
            <span><button class="w-24 h-8 bg-slate-700 text-slate-300 rounded-lg">Read More</button></span> <span><button class="w-20 h-8 bg-orange-400 rounded-xl">Edit<button></span>

</div>
        </div>
      </div>
    </div>
<script>
  const dateEl = document.getElementById("blogdate");

  const today = new Date();

  const formatted = today.toLocaleDateString("en-US", {
    month: "short",
    year: "numeric",
  });

  dateEl.textContent = formatted;
</script>

</body>
</html>
