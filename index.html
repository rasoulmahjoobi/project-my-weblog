<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Weblog</title>
    <script src="tailwind.js"></script>
  </head>
  <body class="w-full h-full flex justify-center">
    <div class="w-full h-full bg-slate-800 p-3 lg:px-20 lg:py-10">
      <!-- titel head  -->
      <div>
        <h1 class="text-4xl text-cyan-500">My Weblog</h1>
      </div>
      <!-- box search and button addBlog -->
      <div class="flex items-center justify-between my-7 gap-10">
        <div class="w-3/4">
          <input
            id="searchInput"
            class="bg-slate-700 h-10 pl-4 rounded-md w-full"
            type="text"
            placeholder="Search blogs..."
          />
        </div>

        <div class="w-1/4">
          <button
            class="bg-gradient-to-r from-blue-500 to-purple-500 text-white text-xs lg:text-lg h-10 rounded-md w-full"
          >
            <a
              href="addBlog-page.html"
              target="_blank"
              class="w-full h-full flex items-center justify-center"
            >
              Add New Blog
            </a>
          </button>
        </div>
      </div>
      <!-- boxes for blog -->
      <div id="box-blog" class="flex flex-col items-center"></div>
    </div>
    <script src="script.js"></script>
